name: Build and Deploy Site

on:
  push:
    branches:
      - main
    # Optional: Only run this workflow if data.js or other source files change
    paths:
      - 'data.js'
      - 'src/**'
      - 'package.json'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 🔧
        run: npm install

      - name: Build Project 🏗️
        run: npm run build # 👈 Change this to whatever your build command is in package.json

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # 👈 Change this to your output folder (e.g., dist, build, or public)
          branch: gh-pages
