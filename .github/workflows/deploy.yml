name: Build and Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - 'data.js'
      - 'src/**'
      - 'package.json'
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'
      - '404.html'
      - 'images/**'
      - 'CNAME'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 🔧
        run: npm install

      - name: Build Project 🏗️
        run: npm run build

      - name: Assemble Site Assets 📂
        run: |
          mkdir -p dist_site
          cp -r index.html data.js manifest.json sw.js workbox-*.js 404.html dist_site/
          cp -r images dist_site/
          if [ -f CNAME ]; then cp CNAME dist_site/; fi
          mkdir -p dist_site/dist
          cp -r dist/styles.css dist_site/dist/

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist_site
          branch: gh-pages
